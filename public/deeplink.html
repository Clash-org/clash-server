<!-- public/deeplink.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Open in Clash App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(253, 80, 3, .2);
            border-radius: 24px;
            border: 1px solid #FD5003;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #FD5003;
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
        }

        h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #FFFFFF80;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: #FD5003;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(253, 80, 3, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .fallback {
            margin-top: 24px;
            font-size: 14px;
            color: #999;
        }

        .fallback a {
            color: #FD5003;
            text-decoration: none;
        }

        .fallback a:hover {
            text-decoration: underline;
        }

        .loading {
            margin-top: 24px;
            font-size: 14px;
            color: #999;
        }

        .error {
            color: #e74c3c;
            margin-top: 16px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="50" height="54" viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9.99994 19.9999C7.34779 19.9999 4.80426 18.9463 2.92891 17.071C1.05356 15.1956 -4.36774e-06 12.6521 -4.25181e-06 9.99994C-4.13588e-06 7.34779 1.05356 4.80427 2.92891 2.92891C4.80426 1.05356 7.34779 -1.52577e-07 9.99994 -4.37111e-07L9.99994 9.99994L9.99994 19.9999Z" fill="black"/>
            <path d="M10.0001 23.0678C12.6522 23.0678 15.1957 22.0142 17.0711 20.1388C18.9464 18.2635 20 15.72 20 13.0678C20 10.4157 18.9464 7.87214 17.0711 5.99679C15.1957 4.12143 12.6522 3.06787 10.0001 3.06787L10.0001 13.0678L10.0001 23.0678Z" fill="black"/>
            </svg>
        </div>
        <h1>Open in Clash</h1>
        <div class="subtitle" id="message">Redirecting to the app...</div>

        <button class="button" id="openButton">Open App</button>

        <div class="fallback hidden" id="fallback">
            <p>Don't have the app yet?</p>
            <a href="#" id="downloadLink">Download Clash App</a>
        </div>

        <div class="loading hidden" id="loading">
            <span>⏳ Trying to open the app...</span>
        </div>

        <div class="error hidden" id="error"></div>
    </div>

    <script>
        // Получаем полный путь из URL
        const fullPath = window.location.pathname; // например: /open/tournament/2

        // Удаляем префикс /open/ чтобы получить целевой путь
        const targetPath = fullPath.replace(/^\/open\//, '');

        // Сохраняем query параметры
        const search = window.location.search;

        // Формируем deep link URL
        const scheme = 'clash';
        let deepLinkUrl;

        if (targetPath) {
            // Если есть путь после open/
            deepLinkUrl = `${scheme}://${targetPath}${search}`;
        } else {
            // Если только /open/ без дополнительного пути
            deepLinkUrl = `${scheme}://`;
        }

        const openButton = document.getElementById('openButton');
        const fallbackDiv = document.getElementById('fallback');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const messageDiv = document.getElementById('message');
        const downloadLink = document.getElementById('downloadLink');
        const downloadHref = "https://github.com/Clash-org/clash-desktop/releases/latest"

        let redirectTimer;
        let appOpened = false;

        // Функция для открытия приложения
        function openApp() {
            if (appOpened) return;

            messageDiv.textContent = 'Opening the app...';
            loadingDiv.classList.remove('hidden');
            // Пытаемся открыть приложение
            window.location.href = deepLinkUrl;

            // Таймер на случай, если приложение не открылось
            redirectTimer = setTimeout(() => {
                if (!appOpened) {
                    appFailed();
                }
            }, 2000);
        }

        // Функция при неудаче
        function appFailed() {
            appOpened = true;
            clearTimeout(redirectTimer);

            messageDiv.textContent = 'Could not open the app';
            loadingDiv.classList.add('hidden');
            fallbackDiv.classList.remove('hidden');
            openButton.textContent = 'Try Again';

            downloadLink.href = downloadHref;
        }

        // Определение платформы
        function getPlatform() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
            if (/Android/i.test(ua)) return 'android';
            return 'desktop';
        }

        // Отслеживаем, когда приложение открылось (скрытие окна)
        window.addEventListener('blur', () => {
            appOpened = true;
            clearTimeout(redirectTimer);
        });

        // Кнопка открытия
        openButton.onclick = () => {
            appOpened = false;
            fallbackDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');
            openApp();
        };

        // Автоматическая попытка открытия
        setTimeout(() => {
            openApp();
        }, 500);

        // Если пользователь на десктопе, показываем сообщение
        if (getPlatform() === 'desktop') {
            messageDiv.textContent = 'This link is intended for mobile devices';
            fallbackDiv.classList.remove('hidden');
            downloadLink.textContent = 'Continue to website';
            downloadLink.href = downloadHref;
            clearTimeout(redirectTimer);
        }

        // Если путь не содержит целевого пути, показываем сообщение
        if (!targetPath) {
            messageDiv.textContent = 'Invalid deep link';
            loadingDiv.classList.add('hidden');
            fallbackDiv.classList.remove('hidden');
            clearTimeout(redirectTimer);
        }
    </script>
</body>
</html>
