version: '3.8'

services:
  duckdns:
    image: linuxserver/duckdns:latest
    container_name: clash-duckdns
    restart: unless-stopped
    environment:
      - SUBDOMAINS=${DUCKDNS_DOMAIN}  # ваш домен
      - TOKEN=${DUCKDNS_TOKEN}         # ваш токен
      - LOG_FILE=false                 # не писать лог каждые 5 минут
    networks:
      - clash-network
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.05'
  postgres:
    image: postgres:16-alpine
    container_name: clash-server-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clash_db}
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - clash-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M

  ollama:
    image: ollama/ollama:latest
    container_name: clash-server-ollama
    restart: always
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./init-ollama.sh:/init-ollama.sh:ro
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MAX_QUEUE=20
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    entrypoint: |
      sh -c "
        /bin/ollama serve &
        sleep 5
        if [ -f /init-ollama.sh ]; then
          sh /init-ollama.sh
        fi
        wait
      "
    networks:
      - clash-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
        reservations:
          memory: 2G
      restart_policy:
        condition: on-failure
        max_attempts: 3

  caddy:
    image: caddy:alpine
    container_name: clash-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      - ./logs:/var/log/caddy
    environment:
      - DOMAIN=${CADDY_DOMAIN:-clash.local}
      - BUN_HOST=host.docker.internal  # Для доступа к Bun на хосте
      - BUN_PORT=${PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - clash-network
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Ключевая настройка!
    depends_on: []  # Не зависит от других сервисов
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ${POSTGRES_DATA_PATH:-./data/postgres}
      o: bind
  ollama_data:
    driver: local
    driver_opts:
      type: none
      device: ${OLLAMA_DATA_PATH:-./data/ollama}
      o: bind

networks:
  clash-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16